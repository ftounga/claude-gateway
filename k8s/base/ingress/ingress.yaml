apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claude-gateway-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # Uploads jusqu'à 20 Mo (spec) + marge multipart
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - portal.ng-itconsulting.com
      secretName: claude-gateway-tls
  rules:
    - host: portal.ng-itconsulting.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: claude-gateway-backend
                port:
                  number: 8080
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: claude-gateway-backend
                port:
                  number: 8080
          - path: /login/oauth2
            pathType: Prefix
            backend:
              service:
                name: claude-gateway-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claude-gateway-frontend
                port:
                  number: 80
