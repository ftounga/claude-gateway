apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  SPRING_PROFILES_ACTIVE: "staging"
  SERVER_PORT: "8080"
  S3_REGION: "eu-west-3"
  S3_PATH_STYLE_ACCESS: "false"
  APP_FRONTEND_URL: "https://portal.ng-itconsulting.com"
  # Fournisseurs réels activés (retrait des bouchons). OCR via AWS Textract (bucket = secret
  # S3_BUCKET, droits via IRSA claude-gateway-backend-staging-irsa) ; embeddings RAG `local`
  # (in-process, sans clé ni réseau) + stockage pgvector (colonne chunks.embedding déjà en base) ;
  # e-mail SMTP réel (config spring.mail.* depuis les secrets MAIL_*).
  APP_OCR_PROVIDER: "textract"
  APP_RAG_EMBEDDING_PROVIDER: "local"
  APP_RAG_VECTOR_STORE: "pgvector"
  APP_EMAIL_PROVIDER: "smtp"
  # Atelier / Claude Code Lite (F-28) : stockage des workspaces sur S3 (bucket S3_BUCKET, préfixe
  # atelier/) pour la persistance entre redémarrages. Défaut `in-memory` réservé aux tests.
  APP_ATELIER_STORAGE: "s3"
  # Limites d'import ZIP Atelier — profil « généreux » (import de gros monorepos/assets).
  # Chaîne cohérente : ingress 155m >= Spring max-request 155MB >= max-file 150MB ; garde-fous
  # anti-zip-bomb sur le décompressé (total/par-fichier/nb-entrées). Purement configurable (réversible).
  APP_UPLOAD_MAX_FILE_SIZE: "150MB"
  APP_UPLOAD_MAX_REQUEST_SIZE: "155MB"
  APP_ATELIER_MAX_TOTAL_BYTES: "419430400"   # 400 Mo décompressé
  APP_ATELIER_MAX_FILE_BYTES: "20971520"     # 20 Mo par fichier
  APP_ATELIER_MAX_ENTRIES: "8000"
  # URLs de retour Stripe Checkout (F-09/F-21) : après paiement/annulation, retour sur la prod
  # (et non localhost). Non secret.
  STRIPE_SUCCESS_URL: "https://portal.ng-itconsulting.com/billing?checkout=success"
  STRIPE_CANCEL_URL: "https://portal.ng-itconsulting.com/billing?checkout=cancel"
