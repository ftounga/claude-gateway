# Profil de test : H2 en mémoire + secret JWT fixe.
# Le secret est un secret DE TEST uniquement (jamais utilisé hors tests).
spring:
  datasource:
    url: jdbc:h2:mem:claudegatewaydb_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
app:
  # Worker de polling OCR désactivé en tests : la logique est testée en appelant
  # DocumentService.pollPendingJobs() directement (déterminisme total, pas de scheduler concurrent).
  ocr:
    polling:
      enabled: false
  rag:
    # Worker d'ingestion RAG désactivé en tests : la logique est testée en appelant
    # IngestionService.ingestPending()/ingest() directement (déterminisme, pas de scheduler concurrent).
    ingestion:
      enabled: false
  jwt:
    secret: test-only-jwt-secret-please-override-in-every-real-environment-0123456789
    expiration: PT24H
  byok:
    # Chiffrement BYOK LOCAL en tests (pas de KMS) : clé maître AES-256 de test uniquement.
    local-key: Ynlvay1sb2NhbC10ZXN0LW1hc3Rlci1rZXktMzJieXQ=
logging:
  level:
    fr.claudegateway: DEBUG
    liquibase: INFO
