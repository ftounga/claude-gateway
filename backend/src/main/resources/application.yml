spring:
  application:
    name: claude-gateway-backend
  profiles:
    active: dev
  mail:
    # SMTP transactionnel (vérification d'adresse, reset mot de passe). Actif seulement si
    # MAIL_HOST est fourni par l'environnement (secrets legalcase réutilisés) ; sinon aucune
    # autoconfiguration JavaMailSender et l'e-mail retombe sur le provider `logging` (dev).
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
  servlet:
    multipart:
      # Plafonds de téléversement (F-04). Alignés sur app.upload.max-size (défaut 32 Mo) ; la marge
      # de la requête couvre l'enrobage multipart. Au-delà => 413 (MaxUploadSizeExceededException).
      max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:32MB}
      max-request-size: ${APP_UPLOAD_MAX_REQUEST_SIZE:33MB}
server:
  port: 8080
  servlet:
    context-path: /api
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
app:
  # URL du frontend, utilisée pour construire les liens d'e-mail (vérification, reset) et
  # la redirection post-connexion OAuth.
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}
  email:
    # Fournisseur d'e-mail : `logging` par défaut (dev/tests, journalise le lien sans SMTP) ;
    # `smtp` en prod (SmtpEmailService via JavaMailSender, config spring.mail.* ci-dessus).
    provider: ${APP_EMAIL_PROVIDER:logging}
    # Adresse expéditeur (From) des e-mails transactionnels. Réutilise MAIL_FROM (secret legalcase).
    from: ${MAIL_FROM:no-reply@ng-itconsulting.com}
  admin:
    # Super-admin (F-20) : cet e-mail est autorisé sur l'API admin et promu ADMIN au démarrage.
    super-admin-email: ${SUPER_ADMIN_EMAIL:ntounga@gmail.com}
  upload:
    # Liste blanche des types MIME acceptés (types supportés par Claude) et plafond de taille (F-04).
    # Décision réversible : ajustable sans changement de code.
    allowed-types: ${APP_UPLOAD_ALLOWED_TYPES:application/pdf,image/png,image/jpeg,image/gif,image/webp,text/plain,text/markdown,text/csv}
    max-size: ${APP_UPLOAD_MAX_SIZE:32MB}
  ocr:
    # Pipeline OCR (F-05). Fournisseur `stub` par défaut (dev/tests, sans AWS) ; `textract` en cluster.
    # Liste blanche MIME, plafond de taille et routage sync/async : décisions réversibles (config).
    provider: ${APP_OCR_PROVIDER:stub}
    max-size: ${APP_OCR_MAX_SIZE:20MB}
    allowed-types: ${APP_OCR_ALLOWED_TYPES:application/pdf,image/png,image/jpeg,image/tiff}
    sync-types: ${APP_OCR_SYNC_TYPES:image/png,image/jpeg}
    polling:
      # Worker intra-backend de complétion des jobs OCR asynchrones (PDF/TIFF) — SF-05-02.
      # Décision par défaut OQ-10 (réversible : workers dédiés + file en V2).
      enabled: ${APP_OCR_POLLING_ENABLED:true}
      interval: ${APP_OCR_POLLING_INTERVAL:15000}
    textract:
      # Accès AWS via chaîne de credentials par défaut (IRSA) — aucun secret en dur ni journalisé.
      # Le bucket S3 est requis pour l'OCR asynchrone (PDF/TIFF) ; absent => async indisponible.
      region: ${APP_OCR_TEXTRACT_REGION:eu-west-3}
      # Bucket S3 pour l'OCR asynchrone (PDF/TIFF). Réutilise le bucket applicatif legalcase
      # (secret S3_BUCKET) si APP_OCR_TEXTRACT_S3_BUCKET n'est pas explicitement fourni.
      s3-bucket: ${APP_OCR_TEXTRACT_S3_BUCKET:${S3_BUCKET:}}
      s3-prefix: ${APP_OCR_TEXTRACT_S3_PREFIX:ocr-inbound/}
  rag:
    # Ingestion RAG (F-06). Stockage vectoriel `noop` par défaut (dev/tests/H2 : pas de colonne
    # vector) ; `pgvector` en cluster (Postgres + extension vector, migration 002/011). Décision
    # réversible : ajustable sans changement de code.
    vector-store: ${APP_RAG_VECTOR_STORE:noop}
    chunk:
      # Découpage : ~400 « tokens » (mots approximés) / overlap 50 (mini-spec F-06). Réversible.
      max-tokens: ${APP_RAG_CHUNK_MAX_TOKENS:400}
      overlap-tokens: ${APP_RAG_CHUNK_OVERLAP_TOKENS:50}
    ingestion:
      # Worker intra-backend d'auto-indexation des documents EXTRACTED — SF-06-02.
      # Décision par défaut OQ-10 (réversible : workers dédiés + file en V2), aligné sur OcrPollingWorker.
      enabled: ${APP_RAG_INGESTION_ENABLED:true}
      interval: ${APP_RAG_INGESTION_INTERVAL:20000}
    ask:
      # Q&A documentaire (F-07). Nombre de chunks de contexte récupérés par défaut (borné [1,20]) et
      # taille des extraits de citation. Décisions réversibles, ajustables sans changement de code.
      top-k: ${APP_RAG_ASK_TOP_K:5}
      snippet-max-chars: ${APP_RAG_ASK_SNIPPET_MAX_CHARS:240}
    embedding:
      # Fournisseur d'embeddings : `stub` par défaut (déterministe, sans réseau) ; `local` (F-15) pour
      # un vectoriseur lexical in-process SANS clé ni réseau (suppression de la dépendance fournisseur) ;
      # `api` pour un fournisseur HTTP OpenAI-compatible. La clé provient EXCLUSIVEMENT de l'environnement,
      # jamais commitée ni journalisée. Dimension 1536 (OQ-01, défaut) = type `chunks.embedding vector(1536)`.
      provider: ${APP_RAG_EMBEDDING_PROVIDER:stub}
      dimension: ${APP_RAG_EMBEDDING_DIMENSION:1536}
      api-key: ${APP_RAG_EMBEDDING_API_KEY:}
      base-url: ${APP_RAG_EMBEDDING_BASE_URL:https://api.openai.com/v1}
      model: ${APP_RAG_EMBEDDING_MODEL:text-embedding-3-small}
      timeout: ${APP_RAG_EMBEDDING_TIMEOUT:PT60S}
  ai:
    anthropic:
      # Clé plateforme (mode Hosted). Fournie EXCLUSIVEMENT par l'environnement, jamais commitée
      # ni journalisée. Si vide, le proxy de chat renvoie 503 (fournisseur dormant).
      api-key: ${ANTHROPIC_API_KEY:}
      base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
      version: ${ANTHROPIC_VERSION:2023-06-01}
      # Modèle par défaut + liste blanche des modèles sélectionnables (OQ-04 contournée par config).
      default-model: ${ANTHROPIC_DEFAULT_MODEL:claude-opus-4-8}
      models: ${ANTHROPIC_MODELS:claude-opus-4-8,claude-sonnet-5,claude-haiku-4-5}
      max-tokens: ${ANTHROPIC_MAX_TOKENS:4096}
      timeout: ${ANTHROPIC_TIMEOUT:PT120S}
  byok:
    # Chiffrement des clés API utilisateur (F-03, OQ-06 : AWS KMS envelope encryption).
    # kms-key-id vide => BYOK dormant (l'ajout de clé renvoie 503), sauf si local-key est fourni.
    # Fournis EXCLUSIVEMENT par l'environnement, jamais commités ni journalisés.
    kms-key-id: ${APP_BYOK_KMS_KEY_ID:}
    region: ${APP_BYOK_REGION:eu-west-3}
    # Clé maître LOCALE base64 (AES 256 bits) réservée au dev/tests, jamais en production.
    local-key: ${APP_BYOK_LOCAL_KEY:}
  billing:
    # Durée de l'essai gratuit en jours (F-09). Décision réversible : ajustable sans changement de code.
    trial-days: ${APP_BILLING_TRIAL_DAYS:14}
    stripe:
      # Secrets Stripe (F-09) : fournis EXCLUSIVEMENT par l'environnement, jamais commités ni journalisés.
      # Si secret-key est vide, le billing est dormant (checkout => 503), comme la clé Anthropic.
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      # Mapping plan -> price ID Stripe (OQ-07 : externalisé, jamais en dur). Par environnement.
      prices:
        SOLO: ${STRIPE_PRICE_SOLO:}
        PRO: ${STRIPE_PRICE_PRO:}
        DAILY: ${STRIPE_PRICE_DAILY:}
      # Mapping pack de tokens (top-up, F-21) -> price ID Stripe (paiement one-shot). Par environnement.
      topup-prices:
        STANDARD: ${STRIPE_PRICE_TOPUP_STANDARD:}
      # URLs de retour Checkout (frontend). Surchargées par environnement.
      success-url: ${STRIPE_SUCCESS_URL:http://localhost:4200/billing?checkout=success}
      cancel-url: ${STRIPE_CANCEL_URL:http://localhost:4200/billing?checkout=cancel}
  quota:
    # Quotas d'entitlement (F-10) : allocation mensuelle de tokens par état d'abonnement/plan.
    # Valeurs commerciales réversibles, ajustables par environnement sans changement de code.
    # V1 = blocage à la limite (pas d'overage monétisé — OQ-08 ouverte pour la variante payante).
    trial-tokens: ${APP_QUOTA_TRIAL_TOKENS:200000}
    plans:
      SOLO: ${APP_QUOTA_SOLO_TOKENS:1000000}
      PRO: ${APP_QUOTA_PRO_TOKENS:5000000}
      DAILY: ${APP_QUOTA_DAILY_TOKENS:500000}
  usage:
    report:
      # Rapport d'usage & coût (F-16) : devise, fenêtre d'historique et tarifs estimés.
      # Valeurs commerciales réversibles, ajustables par environnement sans changement de code.
      # Le coût est une ESTIMATION au tarif blended (les compteurs F-10 n'ont pas de ventilation
      # par modèle). Aucun secret. Prix exprimés par million de tokens.
      currency: ${APP_USAGE_CURRENCY:EUR}
      max-months: ${APP_USAGE_MAX_MONTHS:12}
      input-cost-per-million-tokens: ${APP_USAGE_INPUT_COST_PER_M:3.00}
      output-cost-per-million-tokens: ${APP_USAGE_OUTPUT_COST_PER_M:15.00}
  oauth2:
    google:
      # Identifiants OAuth2/OIDC Google. Fournis exclusivement par l'environnement.
      # Si client-id est vide, OAuth reste dormant (aucun bean, démarrage normal) — voir OAuth2ClientConfig.
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  jwt:
    # Secret de signature HS256. Fourni exclusivement par l'environnement (aucun défaut en dur).
    # L'application refuse de démarrer si absent ou trop court (< 256 bits) — voir JwtService.
    secret: ${APP_JWT_SECRET:}
    # Durée de validité des tokens (format ISO-8601, ex. PT24H). Défaut : 24h.
    expiration: ${APP_JWT_EXPIRATION:PT24H}
  verification:
    # Durée de validité d'un token de vérification d'e-mail (ISO-8601). Défaut : 24h.
    token-ttl: ${APP_VERIFICATION_TOKEN_TTL:PT24H}
  password-reset:
    # Durée de validité d'un token de réinitialisation de mot de passe (ISO-8601). Défaut : 1h.
    token-ttl: ${APP_PASSWORD_RESET_TOKEN_TTL:PT1H}
