spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/claudegatewaydb
    driver-class-name: org.postgresql.Driver
    username: claudegateway
    password: claudegateway
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
logging:
  level:
    fr.claudegateway: DEBUG
    liquibase: INFO
