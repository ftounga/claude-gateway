<main class="home">
  <mat-card class="home__card">
    <div class="home__brand">
      <span class="home__logo">&gt;_</span>
      <h1>claude-gateway</h1>
    </div>
    <p class="home__tagline">
      Accédez à Claude depuis votre navigateur — simple, sécurisé, traçable.
    </p>

    <div class="home__status" [class]="'home__status--' + status()">
      @switch (status()) {
        @case ('checking') {
          <mat-icon>hourglass_empty</mat-icon>
          <span>Vérification du backend…</span>
        }
        @case ('up') {
          <mat-icon>check_circle</mat-icon>
          <span>Backend opérationnel — {{ detail() }}</span>
        }
        @case ('down') {
          <mat-icon>error</mat-icon>
          <span>{{ detail() }}</span>
        }
      }
    </div>
  </mat-card>
</main>
