<section class="admin-page">
  <h1 class="admin-title">Administration</h1>

  @if (loading()) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }

  <mat-card class="admin-card">
    <table mat-table [dataSource]="dataSource" class="admin-table">
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>E-mail</th>
        <td mat-cell *matCellDef="let u">{{ u.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Rôle</th>
        <td mat-cell *matCellDef="let u">{{ u.role }}</td>
      </ng-container>

      <ng-container matColumnDef="planCode">
        <th mat-header-cell *matHeaderCellDef>Plan</th>
        <td mat-cell *matCellDef="let u">{{ u.planCode ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="subscriptionStatus">
        <th mat-header-cell *matHeaderCellDef>Statut</th>
        <td mat-cell *matCellDef="let u">{{ u.subscriptionStatus ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="totalTokens">
        <th mat-header-cell *matHeaderCellDef>Tokens</th>
        <td mat-cell *matCellDef="let u">{{ u.totalTokens | number }}</td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Inscrit le</th>
        <td mat-cell *matCellDef="let u">{{ u.createdAt | date: 'short' }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    @if (!loading() && dataSource.data.length === 0) {
      <p class="admin-empty">Aucun utilisateur.</p>
    }

    <mat-paginator [pageSizeOptions]="[10, 25, 50]" [pageSize]="10"></mat-paginator>
  </mat-card>
</section>
