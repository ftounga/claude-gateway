name: Backend CI/CD

# Auto-trigger sur push désactivé pendant la vague de dev V1 : le CI recrée backend-secrets
# depuis des GitHub Secrets non encore configurés (dont APP_JWT_SECRET). Déploiement staging
# manuel (kustomize) en fin de vague. Réactiver le bloc push: une fois les GitHub Secrets en place.
on:
  workflow_dispatch:

concurrency:
  group: staging-deploy-backend
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: claude-gateway-backend
  NAMESPACE: claude-gateway-staging
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests (unitaires + intégration)
        run: cd backend && ./mvnw verify -q

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          APP_VERSION=staging-${GITHUB_SHA:0:7}
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$APP_VERSION \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:staging-latest \
                       ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$APP_VERSION
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:staging-latest
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Create/update backend K8s secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_JWT_SECRET: ${{ secrets.APP_JWT_SECRET }}
          APP_BYOK_KMS_KEY_ID: ${{ secrets.APP_BYOK_KMS_KEY_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}
          STRIPE_PRICE_TOPUP_STANDARD: ${{ secrets.STRIPE_PRICE_TOPUP_STANDARD }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_URL: ${{ secrets.DB_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          kubectl create secret generic backend-secrets \
            --namespace=$NAMESPACE \
            --from-literal=ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            --from-literal=APP_JWT_SECRET="$APP_JWT_SECRET" \
            --from-literal=APP_BYOK_KMS_KEY_ID="$APP_BYOK_KMS_KEY_ID" \
            --from-literal=GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
            --from-literal=GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
            --from-literal=STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" \
            --from-literal=STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET" \
            --from-literal=STRIPE_PRICE_TOPUP_STANDARD="$STRIPE_PRICE_TOPUP_STANDARD" \
            --from-literal=MAIL_HOST="$MAIL_HOST" \
            --from-literal=MAIL_USERNAME="$MAIL_USERNAME" \
            --from-literal=MAIL_PASSWORD="$MAIL_PASSWORD" \
            --from-literal=MAIL_FROM="$MAIL_FROM" \
            --from-literal=SPRING_DATASOURCE_USERNAME="$DB_USERNAME" \
            --from-literal=SPRING_DATASOURCE_PASSWORD="$DB_PASSWORD" \
            --from-literal=SPRING_DATASOURCE_URL="$DB_URL" \
            --from-literal=S3_BUCKET="$S3_BUCKET" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to staging
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          APP_VERSION: ${{ steps.build.outputs.app_version }}
        run: |
          sed -i "s|REGISTRY_PLACEHOLDER|$ECR_REGISTRY|g" k8s/base/backend/deployment.yaml
          sed -i "s|BACKEND_IMAGE_TAG|$APP_VERSION|g" k8s/base/backend/deployment.yaml
          sed -i "s|IRSA_ROLE_ARN_PLACEHOLDER|${{ secrets.IRSA_BACKEND_ROLE_ARN }}|g" \
            k8s/base/backend/deployment.yaml k8s/overlays/staging/service-account-patch.yaml

          # Force le rollout si les secrets changent
          SECRETS_HASH=$(kubectl -n $NAMESPACE get secret backend-secrets -o yaml \
            | sha256sum | cut -d' ' -f1 | head -c 16)
          sed -i "s|SECRETS_HASH_PLACEHOLDER|$SECRETS_HASH|g" k8s/base/backend/deployment.yaml

          # Préserver l'image frontend courante (ne pas la réinitialiser au placeholder)
          CURRENT_FRONTEND=$(kubectl get deployment claude-gateway-frontend -n $NAMESPACE \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null \
            || echo "$ECR_REGISTRY/claude-gateway-frontend:staging-latest")
          sed -i "s|REGISTRY_PLACEHOLDER/claude-gateway-frontend:FRONTEND_IMAGE_TAG|$CURRENT_FRONTEND|g" \
            k8s/base/frontend/deployment.yaml

          kubectl apply -k k8s/overlays/staging/
          kubectl rollout status deployment/claude-gateway-backend -n $NAMESPACE --timeout=10m

      - name: Health check
        run: |
          sleep 10
          curl -sf https://portal.ng-itconsulting.com/api/actuator/health \
            || (echo "Health check failed after deploy" && exit 1)
