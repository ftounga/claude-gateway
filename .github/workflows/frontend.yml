name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

concurrency:
  group: staging-deploy-frontend
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: claude-gateway-frontend
  NAMESPACE: claude-gateway-staging
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm test -- --watch=false --browsers=ChromeHeadless

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          APP_VERSION=staging-${GITHUB_SHA:0:7}
          docker build --build-arg BUILD_CONFIGURATION=production \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:$APP_VERSION \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:staging-latest \
                       ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$APP_VERSION
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:staging-latest
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy to staging
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          APP_VERSION: ${{ steps.build.outputs.app_version }}
        run: |
          sed -i "s|REGISTRY_PLACEHOLDER|$ECR_REGISTRY|g" k8s/base/frontend/deployment.yaml
          sed -i "s|FRONTEND_IMAGE_TAG|$APP_VERSION|g" k8s/base/frontend/deployment.yaml

          # Préserver l'image backend courante + IRSA + hash secret (pas de rollout backend inutile)
          CURRENT_BACKEND=$(kubectl get deployment claude-gateway-backend -n $NAMESPACE \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null \
            || echo "$ECR_REGISTRY/claude-gateway-backend:staging-latest")
          sed -i "s|REGISTRY_PLACEHOLDER/claude-gateway-backend:BACKEND_IMAGE_TAG|$CURRENT_BACKEND|g" \
            k8s/base/backend/deployment.yaml
          sed -i "s|IRSA_ROLE_ARN_PLACEHOLDER|${{ secrets.IRSA_BACKEND_ROLE_ARN }}|g" \
            k8s/base/backend/deployment.yaml k8s/overlays/staging/service-account-patch.yaml
          SECRETS_HASH=$(kubectl -n $NAMESPACE get secret backend-secrets -o yaml \
            | sha256sum | cut -d' ' -f1 | head -c 16)
          sed -i "s|SECRETS_HASH_PLACEHOLDER|$SECRETS_HASH|g" k8s/base/backend/deployment.yaml

          kubectl apply -k k8s/overlays/staging/
          kubectl rollout status deployment/claude-gateway-frontend -n $NAMESPACE --timeout=10m

      - name: Health check
        run: |
          sleep 10
          curl -sf https://portal.ng-itconsulting.com/api/actuator/health \
            || (echo "Health check failed after deploy" && exit 1)
