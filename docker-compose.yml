version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: claude-gateway-postgres
    environment:
      POSTGRES_DB: claudegatewaydb
      POSTGRES_USER: claudegateway
      POSTGRES_PASSWORD: claudegateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claudegateway -d claudegatewaydb"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
